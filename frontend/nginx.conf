server {
    # Listening on the unprivileged port for your Docker container
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # 1. React Client-Side Routing (Fixes the 404 on refresh)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 🟢 RESTAURANT SERVICE (Node.js)
    # ==========================================
    location /api/restaurants {
        proxy_pass http://restaurant-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================
    # 🐍 MENU SERVICE (Python)
    # ==========================================
    location /api/menu {
        proxy_pass http://menu-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================
    # 🐹 ORDER SERVICE (Go)
    # ==========================================
    location /api/orders {
        proxy_pass http://order-service:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================
    # ☕ DELIVERY SERVICE (Java)
    # ==========================================
    location /api/delivery {
        proxy_pass http://delivery-service:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Standard error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
