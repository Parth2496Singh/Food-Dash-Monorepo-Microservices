          docker push ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/menu-service:${{ needs.resolve-version.outputs.semver }}
          docker push ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/menu-service:latest

  push-order-service:
