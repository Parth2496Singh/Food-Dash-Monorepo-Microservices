          [ -z "$AWS_SECRET_ACCESS_KEY" ] && MISSING="$MISSING AWS_SECRET_ACCESS_KEY"
          [ -z "$AWS_REGION" ]            && MISSING="$MISSING AWS_REGION"
          [ -z "$AWS_ECR_REGISTRY" ]      && MISSING="$MISSING AWS_ECR_REGISTRY"
