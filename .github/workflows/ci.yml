          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Tag SemVer
        run: docker tag food-dash/order-service:ci ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/order-service:${{ needs.resolve-version.outputs.semver }}

      - name: Tag latest
        run: docker tag food-dash/order-service:ci ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/order-service:latest

      - name: Push both tags
        run: |
          docker push ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/order-service:${{ needs.resolve-version.outputs.semver }}
          docker push ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/order-service:latest

  push-delivery-service:
