        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Re-build Docker image
        run: docker build -t food-dash/menu-service:ci ./menu-service

      - name: Authenticate to ECR
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Tag SemVer
        run: docker tag food-dash/menu-service:ci ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/menu-service:${{ needs.resolve-version.outputs.semver }}

      - name: Tag latest
        run: docker tag food-dash/menu-service:ci ${{ secrets.AWS_ECR_REGISTRY }}/food-dash/menu-service:latest

      - name: Push both tags
