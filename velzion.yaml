version: 1.0

# ====================================================================
# 🌩️ VELZION STORM CONTRACT
# ====================================================================
services:
  frontend:
    path: ./frontend       
    port: 80               
    env:
      - VITE_API_URL=/api
      
  restaurant-service:
    path: ./restaurant-service     
    port: 3001             
    needs: [database]      
    env:
      - MONGO_URI=mongodb+srv://mock-user:mock-password@cluster/mock
  order-service:
    path: ./orderservice     
    port: 3002 3           
    needs: [database]      
    env:
      - MYSQL_DSN=mock:mock@tcp(mock:3306)/mock
  menu-service:
    path: ./menu-service     
    port: 3002             
    needs: [database]      
    env:
      - DATABASE_URL=postgresql://mock:mock@mock:5432/mock
  delivery-service:
    path: ./delivery-service     
    port: 3004             
    needs: [database]      
    env:
      - SERVER_PORT=3004
      # 🛡️ MOCK MODE TRIGGERS: Spring Boot auto-translates these to application.properties.
      # Placeholder values will trigger your ConcurrentHashMap fallback.
      - SPRING_DATA_REDIS_HOST=mock-redis.net
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=mock_password


routes:
  /: frontend              
  /api: backend            
